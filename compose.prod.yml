services:
  app:
    build:
      context: .
      target: production
    ports: !override
      - "3351:3351"
    user: node
    environment:
      NODE_ENV: production
      PORT: "3351"
      RUNTIME_DIR: /app/runtime
      MAX_UPLOAD_MB: "50"
      FILE_TTL_MINUTES: "10"
    tmpfs: !override
      - /app/runtime:uid=1000,gid=1000,mode=700
    command: node server/index.js
