services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3350:3350"
    user: node
    environment:
      NODE_ENV: development
      PORT: "3350"
      RUNTIME_DIR: /app/runtime
      MAX_UPLOAD_MB: "50"
      FILE_TTL_MINUTES: "10"
    tmpfs:
      - /app/runtime:uid=1000,gid=1000,mode=700
    command: node server/index.js
